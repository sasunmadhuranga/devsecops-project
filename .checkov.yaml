# .checkov.yaml — project-level policy overrides
# Each skip is justified below. Production remediation notes are included.

soft-fail: false
framework:
  - terraform
directory:
  - terraform/

skip-check:
  # ── ALB / Networking ───────────────────────────────────────────────────────
  # CKV_AWS_2: HTTP listener — demo has no domain/ACM cert.
  #   Production: add ACM cert, HTTPS listener on 443, redirect 80→443.
  - CKV_AWS_2
  # CKV_AWS_103: TLS 1.2 on listener — only applies to HTTPS listeners.
  #   Production: enforced automatically when HTTPS listener is added.
  - CKV_AWS_103
  # CKV_AWS_260: SG allows port 80 from 0.0.0.0/0 — required for public ALB.
  #   Production: acceptable for a public-facing load balancer.
  - CKV_AWS_260
  # CKV_AWS_382: SG allows all egress — required for ECS tasks to reach ECR/SSM.
  #   Production: restrict to specific CIDR/prefix lists if needed.
  - CKV_AWS_382
  # CKV_AWS_23: SG rules missing description — ingress/egress blocks have descriptions.
  #   Checkov also checks the resource-level description which is present.
  - CKV_AWS_23
  # CKV_AWS_378: Target group uses HTTP — internal ALB→ECS traffic, TLS termination at ALB.
  #   Production: add end-to-end TLS with a self-signed cert on the container.
  - CKV_AWS_378
  # CKV_AWS_150: ALB deletion protection — off for easy teardown in demo.
  #   Production: set enable_deletion_protection = true.
  - CKV_AWS_150
  # CKV_AWS_131: ALB drop invalid headers — meaningful only with HTTPS listener.
  #   Production: set drop_invalid_header_fields = true with HTTPS.
  - CKV_AWS_131

  # ── S3 (ALB log bucket) ────────────────────────────────────────────────────
  # CKV_AWS_145: S3 KMS encryption — log bucket uses SSE-S3 (AES256) by default.
  #   Production: add aws_s3_bucket_server_side_encryption_configuration with KMS CMK.
  - CKV_AWS_145
  # CKV_AWS_144: Cross-region replication — overkill for a demo log bucket.
  #   Production: enable for DR requirements on critical data buckets.
  - CKV_AWS_144
  # CKV_AWS_21: S3 versioning — not needed for append-only log files.
  #   Production: enable versioning on buckets holding application data.
  - CKV_AWS_21
  # CKV_AWS_300: S3 lifecycle missing abort multipart — log files are small, no multipart uploads.
  #   Production: add abort_incomplete_multipart_upload rule for data buckets.
  - CKV_AWS_300

  # ── ECR ────────────────────────────────────────────────────────────────────
  # CKV_AWS_136: ECR KMS encryption — uses AES256 (SSE) by default.
  #   Production: create aws_kms_key and reference in encryption_configuration.
  - CKV_AWS_136

  # ── ECS / CloudWatch ───────────────────────────────────────────────────────
  # CKV_AWS_158: CloudWatch log group KMS encryption — cost overhead for demo.
  #   Production: create KMS CMK and set kms_key_id on the log group.
  - CKV_AWS_158
  # CKV_AWS_338: CloudWatch retention — fixed to 30 days (was 7).
  #   Production: increase to 90+ days for compliance.
  - CKV_AWS_338

  # ── SSM ────────────────────────────────────────────────────────────────────
  # CKV_AWS_337: SSM parameter KMS CMK — uses default SSM key (aws/ssm).
  #   Production: create dedicated KMS CMK for SSM parameters.
  - CKV_AWS_337

  # VPC 
  # CKV_AWS_130: Public subnets auto-assign public IP — required for NAT Gateway
  #   and ALB instances to be reachable from the internet.
  #   Production: acceptable for public subnet resources (ALB, NAT GW).
  - CKV_AWS_130
