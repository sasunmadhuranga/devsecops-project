name: DevSecOps Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devsecops-staging
  ECS_CLUSTER: devsecops-staging-cluster        # was: devsecops-cluster
  ECS_SERVICE: devsecops-staging-service        # was: devsecops-service
  ECS_TASK_DEFINITION: devsecops-staging        # was: devsecops-task
  CONTAINER_NAME: app
  TF_STATE_BUCKET: devsecops-tfstate-630596767614

jobs:
  # ---------------------------------------------------------------
  # GATE 1: Secret Scanning
  # ---------------------------------------------------------------
  secret-scanning:
    name: Gate 1 — Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full git history — Gitleaks scans all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE needed — personal account repo is free

  # ---------------------------------------------------------------
  # GATE 2: SAST + Dependency Audit + Code Quality (SonarCloud)
  # ---------------------------------------------------------------
  sast:
    name: Gate 2 — SAST (Bandit + Semgrep CLI + pip-audit + SonarCloud)
    runs-on: ubuntu-latest
    needs: secret-scanning
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit semgrep pip-audit

      # Bandit — Python-specific SAST
      - name: Run Bandit
        run: |
          bandit -r app/ \
            -f json \
            -o bandit-results.json \
            --severity-level medium \
            --confidence-level medium || true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json

      # Semgrep CLI — semgrep/semgrep-action is deprecated; use CLI directly
      - name: Run Semgrep (SARIF output)
        run: |
          semgrep ci \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/jwt \
            --exclude-rule "generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key" \
            --exclude-rule "terraform.aws.security.insecure-load-balancer-tls-version.insecure-load-balancer-tls-version" \
            --sarif \
            --output semgrep-results.sarif
        continue-on-error: true

      - name: Print Semgrep findings
        run: |
          semgrep ci \
            --config p/python \
            --config p/owasp-top-ten \
            --config p/secrets \
            --config p/jwt \
            --exclude-rule "generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key" \
            --exclude-rule "terraform.aws.security.insecure-load-balancer-tls-version.insecure-load-balancer-tls-version" \
            --text

      # pip-audit — CVEs in PyPI dependencies
      - name: Run pip-audit
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-results.json

      - name: Upload pip-audit Report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-results
          path: pip-audit-results.json

      # SonarQube Cloud (formerly SonarCloud)
      # sonarcloud-github-action was archived Oct 2025; sonarqube-scan-action is the replacement
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e  # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=sasunmadhuranga
            -Dsonar.projectKey=sasunmadhuranga_devsecops-project

  # ---------------------------------------------------------------
  # GATE 3: IaC Scanning (Checkov on Terraform)
  # ---------------------------------------------------------------
  iac-scan:
    name: Gate 3 — IaC Scan (Checkov)
    runs-on: ubuntu-latest
    needs: secret-scanning
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Terraform
        # TODO: pin to full SHA once Checkov publishes immutable releases
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false
          check: CKV_AWS_*

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ---------------------------------------------------------------
  # BUILD: Docker image → ECR
  # ---------------------------------------------------------------
  build:
    name: Build — Docker + ECR push
    runs-on: ubuntu-latest
    needs: [sast, iac-scan]
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708  # v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Build, tag and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------
  # GATE 4: Container Image Scanning (Trivy)
  # ---------------------------------------------------------------
  container-scan:
    name: Gate 4 — Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708  # v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      # Step 1 — print full table for visibility (never fails)
      - name: Trivy scan — full report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          trivyignores: .trivyignore

      # Step 2 — generate SARIF and block on CRITICAL/HIGH
      # trivy-action@master was compromised March 2026 — pinned to v0.36.0
      - name: Trivy scan — SARIF + gate
        id: trivy-sarif
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ needs.build.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          trivyignores: .trivyignore
          limit-severities-for-sarif: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ---------------------------------------------------------------
  # DEPLOY: ECS Fargate — Staging
  # ---------------------------------------------------------------
  deploy-staging:
    name: Deploy — ECS Fargate (Staging)
    runs-on: ubuntu-latest
    needs: container-scan
    environment: staging
    outputs:
      staging_url: ${{ steps.get-alb-url.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708  # v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1

      - name: Terraform Init (Staging)
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=devsecops/staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=false"
        working-directory: terraform/

      # Secret passed via TF_VAR env — avoids expanding secrets directly in run block
      - name: Terraform Apply (Staging)
        env:
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_STAGING }}
        run: |
          terraform apply \
            -lock=false \
            -auto-approve \
            -var-file=envs/staging/terraform.tfvars \
            -var="image_tag=${{ github.sha }}"
        working-directory: terraform/

      - name: Get ALB staging URL
        id: get-alb-url
        run: |
          URL=$(aws elbv2 describe-load-balancers \
            --names devsecops-staging-alb \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          echo "url=http://$URL" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------
  # GATE 5: DAST (OWASP ZAP against live staging)
  # ---------------------------------------------------------------
  dast:
    name: Gate 5 — DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: deploy-staging
    permissions:
      security-events: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for staging to be healthy
        run: |
          echo "Waiting for staging to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              ${{ needs.deploy-staging.outputs.staging_url }}/health)
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Staging never became healthy after 4 minutes"
          exit 1

      # TODO: pin to full SHA once ZAP publishes immutable releases
      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ needs.deploy-staging.outputs.staging_url }}
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a"
          fail_action: true

      - name: Prepare reports directory
        run: |
          mkdir -p reports
          chmod -R 777 reports

      - name: Run OWASP ZAP API Scan
        run: |
          docker run --rm \
            --network host \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t ${{ needs.deploy-staging.outputs.staging_url }}/openapi.json \
            -f openapi \
            -r reports/zap-report.html

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/zap-report.html

  # ---------------------------------------------------------------
  # DEPLOY: ECS Fargate — Production (main/master branch only)
  # ---------------------------------------------------------------
  deploy-production:
    name: Deploy — ECS Fargate (Production)
    runs-on: ubuntu-latest
    needs: dast
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708  # v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1

      - name: Terraform Init (Production)
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=devsecops/production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="use_lockfile=false"
        working-directory: terraform/

      # Secret passed via TF_VAR env — avoids expanding secrets directly in run block
      - name: Terraform Apply (Production)
        env:
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET_PRODUCTION }}
        run: |
          terraform apply \
            -lock=false \
            -auto-approve \
            -var-file=envs/production/terraform.tfvars \
            -var="image_tag=${{ github.sha }}"
        working-directory: terraform/

      - name: Notify deployment success
        run: |
          echo "✅ Production deployment complete: ${{ github.sha }}"
